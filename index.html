<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐢 海龟汤 - 多人推理派对</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <h1>🐢 海龟汤</h1>
  <p>多人推理派对 · 主持人模式</p>
</header>

<!-- ====== 初始化页面 ====== -->
<div class="main-container" id="setupPage">
  <div class="card">
    <h2>🎭 游戏设置</h2>

    <div class="form-group">
      <label>👑 主持人名称</label>
      <input type="text" id="hostName" placeholder="输入你的名字" value="主持人" maxlength="12">
    </div>

    <div class="form-group">
      <label>👥 邀请玩家</label>
      <div class="player-add-row">
        <input type="text" id="newPlayerInput" placeholder="输入玩家名字" maxlength="10">
        <button class="btn btn-primary btn-sm" onclick="addPlayer()">+ 添加</button>
      </div>
      <div class="player-tags" id="playerTags"></div>
    </div>

    <div class="form-group">
      <label>📋 可选谜题</label>
      <div class="checkbox-group" id="puzzleCheckboxes"></div>
    </div>

    <button class="btn btn-primary btn-lg" onclick="startGame()" id="startBtn">
      🚀 开始游戏
    </button>
    <p class="hint-text">至少添加1位玩家才能开始</p>
  </div>
</div>

<!-- ====== 游戏页面 ====== -->
<div class="main-container" id="gamePage" style="display:none;">

  <!-- 顶部信息栏 -->
  <div class="top-bar">
    <div class="room-info">
      <span class="badge badge-host">👑 主持人：<strong id="displayHostName"></strong></span>
      <span class="badge badge-puzzle">📋 第 <strong id="puzzleIndex">1</strong>/<span id="puzzleTotal">8</span> 题</span>
    </div>
    <div class="share-area">
      <button class="btn btn-secondary btn-sm" onclick="showInviteModal()">📨 邀请朋友</button>
      <button class="btn btn-secondary btn-sm" onclick="resetGame()">🔄 重新设置</button>
    </div>
  </div>

  <!-- 汤面卡片 -->
  <div class="card" id="faceCard">
    <div class="card-header">
      <strong style="color:var(--gold)">📜 汤面</strong>
      <span class="puzzle-title" id="puzzleTitle"></span>
    </div>
    <div class="soup-face" id="soupFace"></div>
    <details>
      <summary>🔍 点击查看汤底（仅主持人可见）</summary>
      <div class="soup-bottom" id="soupBottom"></div>
    </details>
  </div>

  <!-- 玩家面板 -->
  <div class="card">
    <div class="card-header">
      <strong style="color:var(--gold)">👥 参与者</strong>
      <span style="color:var(--text-dim);font-size:0.85em;">当前回合：<strong id="currentTurn" style="color:var(--gold-light);"></strong></span>
    </div>
    <div class="player-panel" id="playerPanel"></div>
    <div class="turn-controls">
      <button class="btn btn-secondary btn-sm" onclick="nextTurn()" id="nextTurnBtn">⏭ 下一位提问</button>
      <button class="btn btn-secondary btn-sm" onclick="skipTurn()">⏩ 跳过本轮</button>
    </div>
  </div>

  <!-- 问答记录 -->
  <div class="card">
    <div class="card-header">
      <strong style="color:var(--gold)">💬 问答记录</strong>
      <span style="color:var(--text-dim);font-size:0.85em;" id="qaCount">共 0 条</span>
    </div>
    <div class="qa-log" id="qaLog">
      <div class="qa-empty">等待玩家提问...</div>
    </div>
    <!-- 主持人判断区 -->
    <div class="input-area">
      <input type="text" id="questionInput" placeholder="当前玩家在此输入问题..." onkeydown="if(event.key==='Enter')submitQuestion()" disabled>
      <button class="btn btn-primary" onclick="submitQuestion()" id="submitBtn" disabled>提交</button>
    </div>
    <div class="judge-btns" id="judgeBtns" style="display:none;">
      <span class="judge-label">主持人判断：</span>
      <button class="judge-btn judge-yes" onclick="hostJudge('yes')">✅ 是</button>
      <button class="judge-btn judge-no" onclick="hostJudge('no')">❌ 否</button>
      <button class="judge-btn judge-irrelevant" onclick="hostJudge('irrelevant')">➖ 无关</button>
    </div>
  </div>

  <!-- 谜题导航 -->
  <div class="card">
    <div class="puzzle-nav" id="puzzleNav"></div>
  </div>
</div>

<!-- ====== 邀请弹窗 ====== -->
<div class="modal-overlay" id="inviteModal" style="display:none;">
  <div class="modal">
    <h3>📨 邀请朋友一起玩</h3>
    <p class="modal-desc">将以下信息分享给朋友们：</p>
    <div class="invite-card">
      <div class="invite-line">🔗 网页链接（所有人打开即可加入）</div>
      <div class="invite-url" id="inviteUrl"></div>
      <button class="btn btn-primary btn-sm" onclick="copyInviteLink()">📋 复制链接</button>
    </div>
    <div class="invite-card">
      <div class="invite-line">📝 当前玩家名单：</div>
      <div class="player-list-text" id="invitePlayerList"></div>
    </div>
    <div class="invite-card">
      <div class="invite-line">🎮 玩法说明：</div>
      <ul class="invite-rules">
        <li>由 <strong>主持人</strong> 掌控游戏流程</li>
        <li>玩家 <strong>轮流提问</strong>，主持人判断「是/否/无关」</li>
        <li>任何人猜出真相即可说出答案</li>
        <li>主持人可随时揭晓汤底</li>
      </ul>
    </div>
    <button class="btn btn-secondary" onclick="closeInviteModal()" style="margin-top:12px;">关闭</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/script.js"></script>
</body>
</html>
