<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐢 海龟汤 - 情境猜谜游戏</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <h1>🐢 海龟汤</h1>
  <p>情境猜谜游戏 · 8道精选谜题</p>
</header>

<div class="main-container">
  <!-- 模式切换 -->
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('auto')" id="modeAuto">🤖 自动判断</button>
    <button class="mode-btn" onclick="setMode('manual')" id="modeManual">👤 手动判断</button>
  </div>

  <!-- 题目导航 -->
  <div class="card">
    <div class="puzzle-nav" id="puzzleNav"></div>
  </div>

  <!-- 汤面卡片 -->
  <div class="card" id="faceCard">
    <strong style="color:var(--gold)">📜 汤面</strong>
    <div class="soup-face" id="soupFace"></div>
    <details>
      <summary>🔍 点击查看汤底（剧透）</summary>
      <div class="soup-bottom visible" id="soupBottom" style="display:block;"></div>
    </details>
  </div>

  <!-- 问答记录 -->
  <div class="card">
    <strong style="color:var(--gold)">💬 问答记录</strong>
    <div class="qa-log" id="qaLog">
      <div style="color:var(--text-muted);text-align:center;padding:30px;">
        输入你的问题，尝试推理出海龟汤的真相...
      </div>
    </div>
    <!-- 输入区 -->
    <div class="input-area">
      <input type="text" id="questionInput" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')askQuestion()">
      <button class="btn btn-primary" onclick="askQuestion()">提问</button>
      <button class="btn btn-secondary btn-sm" onclick="resetQA()">重置</button>
    </div>
    <!-- 手动判断按钮 -->
    <div class="judge-btns" id="judgeBtns" style="display:none;">
      <button class="judge-btn" onclick="manualJudge('yes')" style="color:var(--green)">✅ 是 (Y)</button>
      <button class="judge-btn" onclick="manualJudge('no')" style="color:var(--red)">❌ 否 (N)</button>
      <button class="judge-btn" onclick="manualJudge('irrelevant')" style="color:var(--text-muted)">➖ 无关 (I)</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>



  <script src="js/script.js"></script>
</body>
</html>
